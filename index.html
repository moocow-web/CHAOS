<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAOS</title>
</head>
<body>
    <h1>Welcome!</h1>
    <p>Enable popups and click the button to see the effect.</p>
    
    <button onclick="startChaos()">START THE CHAOS</button>

    <script>
      function startChaos() {
        // We use setInterval instead of 'while' so the browser doesn't crash
        setInterval(() => {
          const boom = window.open("https://moocow-web.github.io/CHAOS/", "_blank", "width=400,height=300");
          
          if (boom) {
            boom.moveBy(50, 20);
            setTimeout(() => boom.moveBy(-50, -20), 100);
          }
        }, 500); // Opens a new window every 500ms
      }
    </script>
</body>
</html>
